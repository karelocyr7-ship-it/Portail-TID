name: Security
on:
  pull_request:
  push:
    branches: [main]
concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  repository-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.12.1
      - uses: actions/setup-node@v4
        with:
          node-version: 24.18.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Refuser les fichiers de secrets suivis
        run: '! git ls-files | grep -E "(^|/)\\.env($|/)|.*\\.(pem|key|p12|pfx)$"'
      - name: Rechercher des signatures de secrets
        run: |
          if git grep -n -I -E 'BEGIN (RSA|OPENSSH|EC|DSA) PRIVATE KEY|gh[pousr]_[A-Za-z0-9_]{20,}|AKIA[0-9A-Z]{16}' -- ':!.env.example'; then
            echo "Signature de secret détectée" >&2
            exit 1
          fi
      - name: Audit des dépendances de production
        run: pnpm audit --prod --audit-level high
