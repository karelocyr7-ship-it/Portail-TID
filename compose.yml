name: tad-portail

services:
  caddy:
    image: caddy:2.11.3
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infrastructure/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - tad-caddy-data:/data
      - tad-caddy-config:/config
    environment:
      ACME_EMAIL: ${ACME_EMAIL:?ACME_EMAIL is required}
    networks: [tad-edge, tad-app, tad-identity]
    depends_on:
      portal:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    mem_limit: 256m
    cpus: 0.50
    logging:
      driver: json-file
      options: {max-size: "10m", max-file: "3"}

  portal:
    build:
      context: .
      dockerfile: apps/portal/Dockerfile
    image: tad-portal:0.1.0
    restart: unless-stopped
    environment:
      NODE_ENV: production
      TZ: ${TZ:-Africa/Abidjan}
      PORT: "3000"
      HOSTNAME: 0.0.0.0
      PORTAL_PUBLIC_URL: ${PORTAL_PUBLIC_URL:?PORTAL_PUBLIC_URL is required}
      KEYCLOAK_PUBLIC_URL: ${KEYCLOAK_PUBLIC_URL:?KEYCLOAK_PUBLIC_URL is required}
      KEYCLOAK_ISSUER: ${KEYCLOAK_ISSUER:?KEYCLOAK_ISSUER is required}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:?KEYCLOAK_CLIENT_ID is required}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET:?KEYCLOAK_CLIENT_SECRET is required}
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      SESSION_SECRET: ${SESSION_SECRET:?SESSION_SECRET is required}
    expose: ["3000"]
    networks: [tad-app, tad-identity, tad-data]
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: [CMD, node, -e, "fetch('http://127.0.0.1:3000/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    mem_limit: 2g
    cpus: 1.50
    logging:
      driver: json-file
      options: {max-size: "10m", max-file: "3"}

  postgres:
    image: postgres:16.10-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_SUPERUSER:?POSTGRES_SUPERUSER is required}
      POSTGRES_PASSWORD: ${POSTGRES_SUPERUSER_PASSWORD:?POSTGRES_SUPERUSER_PASSWORD is required}
      POSTGRES_DB: postgres
      PORTAL_DB_PASSWORD: ${PORTAL_DB_PASSWORD:?PORTAL_DB_PASSWORD is required}
      KEYCLOAK_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD:?KEYCLOAK_DB_PASSWORD is required}
      N8N_DB_PASSWORD: ${N8N_DB_PASSWORD:?N8N_DB_PASSWORD is required}
    volumes:
      - tad-postgres-data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init.sh:/docker-entrypoint-initdb.d/10-init.sh:ro
    networks: [tad-data]
    healthcheck:
      test: [CMD-SHELL, "pg_isready -U $${POSTGRES_USER} -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 10
    mem_limit: 2g
    cpus: 1.50
    logging:
      driver: json-file
      options: {max-size: "20m", max-file: "5"}

  keycloak:
    image: quay.io/keycloak/keycloak:26.6.2
    restart: unless-stopped
    command: [start]
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: keycloak_user
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD:?KEYCLOAK_DB_PASSWORD is required}
      KC_HTTP_ENABLED: "true"
      KC_HTTP_RELATIVE_PATH: /auth
      KC_HOSTNAME: ${KEYCLOAK_PUBLIC_URL:?KEYCLOAK_PUBLIC_URL is required}
      KC_PROXY_HEADERS: xforwarded
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "false"
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN_USERNAME:?KEYCLOAK_ADMIN_USERNAME is required}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:?KEYCLOAK_ADMIN_PASSWORD is required}
    expose: ["8080"]
    networks: [tad-identity, tad-data]
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: [CMD-SHELL, "bash -c 'exec 3<>/dev/tcp/127.0.0.1/9000 && printf \"GET /auth/health/ready HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n\" >&3 && grep -q UP <&3'"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 40s
    mem_limit: 2g
    cpus: 1.50
    logging:
      driver: json-file
      options: {max-size: "20m", max-file: "5"}

  n8n:
    image: docker.n8n.io/n8nio/n8n:2.30.5
    restart: unless-stopped
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: "5432"
      DB_POSTGRESDB_DATABASE: n8n
      DB_POSTGRESDB_USER: n8n_user
      DB_POSTGRESDB_PASSWORD: ${N8N_DB_PASSWORD:?N8N_DB_PASSWORD is required}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:?N8N_ENCRYPTION_KEY is required}
      N8N_HOST: 127.0.0.1
      N8N_PORT: "5678"
      N8N_PROTOCOL: http
      TZ: ${TZ:-Africa/Abidjan}
      GENERIC_TIMEZONE: ${TZ:-Africa/Abidjan}
    expose: ["5678"]
    volumes:
      - tad-n8n-data:/home/node/.n8n
    networks: [tad-agents, tad-data]
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: [CMD-SHELL, "wget -q -O- http://127.0.0.1:5678/healthz >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    mem_limit: 1g
    cpus: 1.00
    logging:
      driver: json-file
      options: {max-size: "20m", max-file: "5"}

  uptime-kuma:
    image: louislam/uptime-kuma:2.3.2
    restart: unless-stopped
    expose: ["3001"]
    volumes:
      - tad-uptime-data:/app/data
    networks: [tad-monitoring]
    mem_limit: 512m
    cpus: 0.50
    logging:
      driver: json-file
      options: {max-size: "10m", max-file: "3"}

networks:
  tad-edge:
    name: tad-edge
    external: true
  tad-app:
    name: tad-app
    external: true
  tad-identity:
    name: tad-identity
    external: true
  tad-agents:
    name: tad-agents
    external: true
  tad-data:
    name: tad-data
    external: true
  tad-monitoring:
    name: tad-monitoring
    external: true

volumes:
  tad-caddy-data:
    name: tad-caddy-data
    external: true
  tad-caddy-config:
    name: tad-caddy-config
    external: true
  tad-postgres-data:
    name: tad-postgres-data
    external: true
  tad-n8n-data:
    name: tad-n8n-data
    external: true
  tad-uptime-data:
    name: tad-uptime-data
    external: true
